services:
  # 1. Web Server (Nginx)
  web:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html:z
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - mercado-network

  # 2. Laravel Application (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - ./backend:/var/www/html:z
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      efactura-node:
        condition: service_healthy
    networks:
      - mercado-network

  # 3. ANAF UBL Microservice (Node.js)
  efactura-node:
    build:
      context: ./efactura-microservice
      dockerfile: Dockerfile
    # No ports exposed to host, purely internal communication
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - mercado-network

  # 4. Database (MySQL 8)
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - db-data:/var/lib/mysql:z
    networks:
      - mercado-network

  # 5. Redis (For Laravel Queues / Scheduled Tasks)
  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data:z
    networks:
      - mercado-network

  # 6. Frontend Asset Compiler (Vite/Node)
  vite:
    image: node:20-alpine
    user: "${PUID:-1000}:${PGID:-1000}"
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html:z
    ports:
      - "5173:5173"
    # Start the dev server automatically on up
    command: npm run dev -- --host
    networks:
      - mercado-network

  # 7. Typesense (Fast Search Engine)
  typesense:
    image: typesense/typesense:26.0
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data:z
    env_file:
      - ./.env
    # We remove the flags from 'command' because Typesense reads 
    # TYPESENSE_API_KEY and TYPESENSE_DATA_DIR directly from the env_file.
    command: '--enable-cors=true' 
    networks:
      - mercado-network

  # 8. Ollama (LLM & Embeddings Server)
  ollama:
    # Use the standard latest image (it has Vulkan support built-in)
    image: ollama/ollama:latest 
    privileged: true
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_NUM_PARALLEL=2
      # Force Ollama to use the Vulkan backend instead of ROCm
      - OLLAMA_VULKAN=1 
    devices:
      - "/dev/dri:/dev/dri" # Vulkan uses the Direct Rendering Infrastructure
    volumes:
      - ollama-data:/root/.ollama:z
    networks:
      - mercado-network

  # 9. Vector Engine (Python + FAISS + FastAPI)
  vector-engine:
    build:
      context: ./vector-engine
      dockerfile: Dockerfile
    volumes:
      - ./vector-engine:/app:z
      - vector-data:/app/data:z
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - mercado-network
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: mercado_stripe_cli
    # Replace 'nginx' with the actual name of your Nginx or App service in docker-compose
    command: listen --forward-to http://nginx/api/webhooks/stripe
    env_file:
      - ./.env
    environment:
      # Stripe CLI looks for this specific variable name to authenticate
      - STRIPE_API_KEY=${STRIPE_SECRET}
    depends_on:
      - web # Ensure the web server is up before Stripe tries to forward
    
networks:
  mercado-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
  typesense-data:
  ollama-data:
  vector-data: